<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI HEDGE FUND BOT ELITE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0b132b; color:white; text-align:center; }
button { padding:15px; margin:10px; width:85%; border-radius:10px; border:none; font-size:18px; }
.card { background:#1c2541; padding:15px; margin:10px; border-radius:10px; }
.buy { color:lime; }
.sell { color:red; }
.wait { color:orange; }
</style>
</head>

<body>

<h1>🚀 AI HEDGE FUND BOT ELITE</h1>
<p id="status">Status: OFF</p>

<button onclick="startBot()">START BOT</button>
<button onclick="runBacktest()">RUN BACKTEST</button>

<div id="output"></div>

<h3>📊 Equity Curve</h3>
<canvas id="chart"></canvas>

<h3>📈 Result</h3>
<div id="result"></div>

<script>

// ===== MODEL (PERSISTENT AI) =====
let MODEL = JSON.parse(localStorage.getItem("model")) || {
  w: [0.5, -0.3, 0.2, 0.1, 0.4, 0.3],
  lr: 0.01
};

function saveModel(){
  localStorage.setItem("model", JSON.stringify(MODEL));
}

// ===== FETCH DATA =====
async function fetchOHLC(symbol){
  try{
    let res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=1m&limit=200`);
    let data = await res.json();

    return data.map(c => ({
      close: parseFloat(c[4]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3])
    }));
  } catch(e){
    console.log("API ERROR → fallback");
    return Array.from({length:200},()=>({
      close: 50000+Math.random()*1000,
      high: 51000,
      low: 49000
    }));
  }
}

// ===== INDICATORS =====
function ema(data,p){
  let k=2/(p+1), e=data[0];
  return data.map(v=>e=v*k+e*(1-k));
}

function rsi(data,p=14){
  let g=0,l=0;
  for(let i=1;i<p;i++){
    let d=data[i]-data[i-1];
    if(d>0) g+=d; else l-=d;
  }
  g/=p; l/=p;
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function atr(data){
  let sum=0;
  for(let i=1;i<data.length;i++){
    sum += Math.abs(data[i].high-data[i].low);
  }
  return sum/data.length;
}

// ===== MARKET STRUCTURE =====
function marketStructure(data){
  let highs = data.map(d=>d.high);
  let lows = data.map(d=>d.low);

  let lastHigh = Math.max(...highs.slice(-10));
  let prevHigh = Math.max(...highs.slice(-20,-10));

  let lastLow = Math.min(...lows.slice(-10));
  let prevLow = Math.min(...lows.slice(-20,-10));

  if(lastHigh > prevHigh && lastLow > prevLow) return 1;
  if(lastHigh < prevHigh && lastLow < prevLow) return -1;
  return 0;
}

// ===== MOMENTUM =====
function momentumStrength(data){
  let closes = data.map(d=>d.close);
  return (closes.at(-1) - closes.at(-10))/100;
}

// ===== FEATURE =====
function features(data){

  let closes = data.map(x=>x.close);

  let ema9 = ema(closes,9).at(-1);
  let ema21 = ema(closes,21).at(-1);

  let trend = ema9 - ema21;
  let r = rsi(closes);
  let vol = atr(data);

  let structure = marketStructure(data);
  let momentum = momentumStrength(data);

  return [
    trend/100,
    (r-50)/50,
    vol/100,
    closes.at(-1)/10000,
    structure,
    momentum
  ];
}

// ===== AI =====
function predict(x){
  let z = MODEL.w.reduce((s,w,i)=>s+w*x[i],0);
  return 1/(1+Math.exp(-z));
}

function train(x,y){
  let p = predict(x);
  let err = y - p;

  for(let i=0;i<MODEL.w.length;i++){
    MODEL.w[i] += MODEL.lr * err * x[i];
  }

  saveModel();
}

// ===== DECISION =====
function decide(p){
  if(p > 0.65) return "BUY";
  if(p < 0.35) return "SELL";
  return "WAIT";
}

// ===== LIVE BOT =====
let running=false;

async function startBot(){
  running=true;
  document.getElementById("status").innerText="RUNNING 🚀";

  while(running){

    let symbols=["BTCUSDT","ETHUSDT"];
    let html="";

    for(let s of symbols){

      let data=await fetchOHLC(s);
      let x=features(data);
      let p=predict(x);
      let signal=decide(p);

      let price=data.at(-1).close;

      let cls = signal=="BUY"?"buy":signal=="SELL"?"sell":"wait";

      html += `
      <div class="card">
        <b>${s}</b><br>
        <span class="${cls}">${signal}</span><br>
        Prob: ${p.toFixed(2)}<br>
        Price: ${price}
      </div>`;
    }

    document.getElementById("output").innerHTML=html;

    await new Promise(r=>setTimeout(r,5000));
  }
}

// ===== BACKTEST =====
async function runBacktest(){

  let data = await fetchOHLC("BTCUSDT");

  let balance=1000;
  let equity=[balance];

  let wins=0,total=0;

  for(let i=50;i<data.length-10;i++){

    let slice=data.slice(i-50,i);
    let x=features(slice);
    let p=predict(x);
    let signal=decide(p);

    let entry=data[i].close;
    let atrVal = atr(slice);

    let tp, sl;

    if(signal=="BUY"){
      tp = entry + atrVal*1.5;
      sl = entry - atrVal;
    }

    if(signal=="SELL"){
      tp = entry - atrVal*1.5;
      sl = entry + atrVal;
    }

    let result="LOSS";

    for(let j=1;j<=10;j++){
      let price=data[i+j].close;

      if(signal=="BUY"){
        if(price>=tp){ result="WIN"; break;}
        if(price<=sl){ break;}
      }

      if(signal=="SELL"){
        if(price<=tp){ result="WIN"; break;}
        if(price>=sl){ break;}
      }
    }

    if(signal!="WAIT"){
      total++;

      if(result=="WIN"){
        balance*=1.02;
        wins++;
        train(x,1);
      } else {
        balance*=0.98;
        train(x,0);
      }
    }

    equity.push(balance);
  }

  let winrate=(wins/total*100).toFixed(2);

  document.getElementById("result").innerHTML=
    `Balance: $${balance.toFixed(2)}<br>
     Winrate: ${winrate}%<br>
     Trades: ${total}`;

  drawChart(equity);
}

// ===== CHART =====
function drawChart(data){
  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:data.map((_,i)=>i),
      datasets:[{label:"Equity",data:data}]
    }
  });
}

</script>

</body>
</html>
