    <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI REAL TRADING BOT FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0b132b; color:white; text-align:center; }
button { padding:15px; margin:10px; width:85%; border-radius:10px; border:none; font-size:18px; }
</style>
</head>

<body>

<h1>🚀 AI REAL TRADING BOT FINAL</h1>

<button onclick="run()">RUN OPTIMIZATION</button>

<canvas id="chart"></canvas>
<div id="result"></div>

<script>

// ===== LOAD MODEL =====
let MODEL = JSON.parse(localStorage.getItem("model")) || {
  w: [0.3, 0.2, -0.2, 0.1, 0.2],
  lr: 0.01
};

// ===== FETCH DATA =====
async function fetchData(){
  let res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=600");
  let d = await res.json();

  return d.map(x=>({
    close:+x[4],
    high:+x[2],
    low:+x[3]
  }));
}

// ===== INDICATORS =====
function ema(d,p){
  let k=2/(p+1), e=d[0];
  return d.map(v=>e=v*k+e*(1-k));
}

function rsi(d,p=14){
  let g=0,l=0;
  for(let i=1;i<=p;i++){
    let x=d[i]-d[i-1];
    if(x>0) g+=x; else l-=x;
  }
  g/=p; l/=p;
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function atr(d,p=14){
  let trs=[];
  for(let i=1;i<d.length;i++){
    let tr = Math.max(
      d[i].high-d[i].low,
      Math.abs(d[i].high-d[i-1].close),
      Math.abs(d[i].low-d[i-1].close)
    );
    trs.push(tr);
  }
  return trs.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// ===== FEATURE =====
function feat(d){
  let c=d.map(x=>x.close);

  let e9=ema(c,9).at(-1);
  let e21=ema(c,21).at(-1);
  let e50=ema(c,50).at(-1);

  return [
    (e9-e21)/e21,
    (c.at(-1)-c.at(-5))/c.at(-5),
    (rsi(c)-50)/50,
    atr(d)/c.at(-1),
    (c.at(-1)-e50)/e50
  ];
}

// ===== AI =====
function predict(x){
  let z = MODEL.w.reduce((s,w,i)=>s+w*x[i],0);
  let p = 1/(1+Math.exp(-z));
  return Math.max(0.05, Math.min(0.95,p));
}

function train(x,y){
  let p = predict(x);
  let err = y - p;

  for(let i=0;i<MODEL.w.length;i++){
    MODEL.w[i] += MODEL.lr * err * x[i];

    // clamp
    if(MODEL.w[i] > 5) MODEL.w[i] = 5;
    if(MODEL.w[i] < -5) MODEL.w[i] = -5;
  }
}

// ===== DECISION =====
function decide(p){
  if(p > 0.65) return "BUY";
  if(p < 0.35) return "SELL";
  return "WAIT";
}

// ===== BACKTEST =====
function simulate(data){

  let balance = 1000;
  let equity=[balance];
  let win=0,total=0;

  for(let i=60;i<data.length-15;i++){

    let slice=data.slice(i-60,i);
    let x=feat(slice);

    let p=predict(x);
    let signal=decide(p);

    if(signal=="WAIT") continue;

    // ===== FILTER =====
    let e50 = ema(slice.map(x=>x.close),50).at(-1);
    let last = slice.at(-1).close;

    if(signal=="BUY" && last < e50) continue;
    if(signal=="SELL" && last > e50) continue;

    if(atr(slice)/last < 0.001) continue;

    // ===== ENTRY =====
    let entry=data[i].close;
    let atrv=atr(slice);

    let sl,tp;

    if(signal=="BUY"){
      sl=entry-atrv*1.5;
      tp=entry+atrv*2;
    } else {
      sl=entry+atrv*1.5;
      tp=entry-atrv*2;
    }

    let result=0;

    for(let j=i+1;j<i+15;j++){
      let price=data[j].close;

      if(signal=="BUY"){
        if(price>=tp){ result=1; break;}
        if(price<=sl){ result=0; break;}
      } else {
        if(price<=tp){ result=1; break;}
        if(price>=sl){ result=0; break;}
      }
    }

    total++;

    // ===== DYNAMIC RISK =====
    let conf = Math.abs(p-0.5)*2;
    let risk = 0.01 + conf*0.03;

    if(result){
      balance*=1+risk;
      win++;
    } else {
      balance*=1-risk;
    }

    train(x,result);

    equity.push(balance);
  }

  return {
    balance,
    winrate:(win/total*100)||0,
    trades:total,
    equity
  };
}

// ===== OPTIMIZATION =====
async function run(){

  let data=await fetchData();

  let best=null;

  for(let k=0;k<8;k++){

    let res = simulate(data);

    if(!best || res.balance > best.balance){
      best = {
        ...res,
        model: JSON.parse(JSON.stringify(MODEL))
      };
    }

    // improve model toward best
    if(best){
      MODEL.w = MODEL.w.map((w,i)=> w + (best.model.w[i]-w)*0.3);
    }
  }

  localStorage.setItem("model", JSON.stringify(MODEL));

  document.getElementById("result").innerHTML =
    `Balance: $${best.balance.toFixed(2)}<br>
     Winrate: ${best.winrate.toFixed(2)}%<br>
     Trades: ${best.trades}`;

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:best.equity.map((_,i)=>i),
      datasets:[{data:best.equity,label:"Equity"}]
    }
  });
}

</script>

</body>
</html>
