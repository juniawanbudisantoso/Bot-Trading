
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI BOT STABLE FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#0b132b; color:white; text-align:center; }
button { padding:15px; margin:10px; width:85%; border-radius:10px; border:none; font-size:18px; }
.card { background:#1c2541; padding:15px; margin:10px; border-radius:10px; }
.buy { color:lime; }
.sell { color:red; }
.wait { color:orange; }
</style>
</head>

<body>

<h1>🤖 AI BOT STABLE</h1>

<button onclick="runBacktest()">RUN BACKTEST</button>

<canvas id="chart"></canvas>
<div id="result"></div>

<script>

// ===== RESET MODEL (ANTI RUSAK) =====
let MODEL = {
  w: [0.3, -0.2, 0.2, 0.1],
  lr: 0.01
};

// ===== FETCH =====
async function fetchData(){
  let res = await fetch("https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m&limit=300");
  let d = await res.json();
  return d.map(x=>({
    close:+x[4],
    high:+x[2],
    low:+x[3]
  }));
}

// ===== INDICATOR =====
function ema(d,p){
  let k=2/(p+1), e=d[0];
  return d.map(v=>e=v*k+e*(1-k));
}

function rsi(d){
  let g=0,l=0;
  for(let i=1;i<14;i++){
    let x=d[i]-d[i-1];
    if(x>0) g+=x; else l-=x;
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function atr(d){
  let s=0;
  for(let i=1;i<d.length;i++){
    s+=Math.abs(d[i].high-d[i].low);
  }
  return s/d.length;
}

// ===== FEATURE (FIXED) =====
function feat(d){

  let c=d.map(x=>x.close);

  let e9=ema(c,9).at(-1);
  let e21=ema(c,21).at(-1);

  let trend = (e9 - e21) / e21;
  let momentum = (c.at(-1)-c.at(-5)) / c.at(-5);
  let r = (rsi(c)-50)/50;
  let v = atr(d)/c.at(-1);

  return [trend, momentum, r, v];
}

// ===== AI =====
function predict(x){
  let z = MODEL.w.reduce((s,w,i)=>s+w*x[i],0);
  let p = 1/(1+Math.exp(-z));

  return Math.max(0.05, Math.min(0.95,p)); // anti 0 / 1
}

function train(x,y){
  let p = predict(x);
  let err = y - p;

  MODEL.w = MODEL.w.map((w,i)=>w + MODEL.lr * err * x[i]);
}

// ===== DECISION =====
function decide(p){
  if(p > 0.65) return "BUY";
  if(p < 0.35) return "SELL";
  return "WAIT";
}

// ===== BACKTEST =====
async function runBacktest(){

  let data = await fetchData();

  let balance = 1000;
  let equity = [balance];

  let win=0, total=0;

  for(let i=50;i<data.length-5;i++){

    let slice = data.slice(i-50,i);

    let x = feat(slice);

    // 🔥 FILTER SIDEWAYS
    if(Math.abs(x[0]) < 0.0003) continue;

    let p = predict(x);
    let signal = decide(p);

    if(signal=="WAIT") continue;

    let entry = data[i].close;
    let next = data[i+1].close;

    let result = 0;

    if(signal=="BUY" && next > entry) result = 1;
    if(signal=="SELL" && next < entry) result = 1;

    total++;

    if(result){
      balance *= 1.01;
      win++;
    } else {
      balance *= 0.99;
    }

    train(x,result);

    equity.push(balance);
  }

  let wr = (win/total*100).toFixed(2);

  document.getElementById("result").innerHTML =
    `Balance: $${balance.toFixed(2)}<br>Winrate: ${wr}%<br>Trades: ${total}`;

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:equity.map((_,i)=>i),
      datasets:[{data:equity,label:"Equity"}]
    }
  });
}

</script>

</body>
</html>
